<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>پنل کاربری</title>

<meta name=”viewport” content=”width=device-width, initial-scale=1.0”>

<style>

body{
font-family:tahoma;
background:#f5f7fa;
Text-align:center;
Padding-top:100px;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(135deg,#81dd84,#89bde7);
color:white;
}



.logo{

font-size:22px;
font-weight:bold;

}

 

nav a{
color:rgb(255, 255, 255);
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

.card{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}
.health-card{
margin-top:20px;
padding:20px;
border-radius:15px;
color:white;
box-shadow:0 4px 15px rgba(0,0,0,.2);
animation:showCard 1s ease;
}

@keyframes showCard{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.side-menu a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
font-size:18px;
}

.side-menu a:hover{
background:#333;
}

.menu-btn{

font-size:32px;
top: 20px;
right: 20px;
cursor:pointer;
z-index: 1000;
color: white;
}


.side-menu{
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    right: 0;
    background: #222;
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 60px;
    z-index: 999;
}
footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:#222;
    color:white;
}

.dark.mode{
    background: #121212;
    color: white;
}

.dark.mode.card{
    background: #1e1e1e;
    color: white;

}
.dark.mode a{
    color: #90caf9;
}

.profile-card{
    margin: 20px 0;
    padding: 20px;
    background: white;
    border-radius: 15px;
    box-shadow: rgba(0,0,0,.1);
}

Body{

Margin:0;

Font-family:tahoma;

Min-height:100vh;

Display:flex;

Flex-direction:column;

Background:linear-gradient(
-45deg,
#4CAF50,
#2196F3,
#81dd84,
#89bde7
);

Background-size:400% 400%;

Animation:gradientBG 12s ease infinite;

}

@keyframes gradientBG{

0%{
Background-position:0% 50%;
}

50%{
Background-position:100% 50%;
}

100%{
Background-position:0% 50%;
}

}
.dark-btn{

Font-size:28px;

Cursor:pointer;

Margin-right:15px;
}
.dark-mode{

Background:#121212 !important;

Color:white;

}

.dark-mode .stat-box,
.dark-mode .feature-item,
.dark-mode .card,
.dark-mode .login-box{

Background:#1e1e1e;

Color:white;

}

.dark-mode footer{

Background:#000;

}

.dark-mode input{

Background:#333;

Color:white;

Border:1px solid #555;

}

@media (max-width: 600px) {

  Body {
    Padding: 10px;
  }

  .container {
    Width: 100%;
    Border-radius: 15px;
    Padding: 20px;
  }

  H1 {
    Font-size: 18px;
  }

  Input, select, button {
    Font-size: 16px;
    Padding: 12px;
  }

  #bodyImage {
    Width: 100px;
  }

  .bmi-bar {
    Flex-direction: column;
  }

  .bar {
    Margin-bottom: 5px;
  }
}
@media (min-width: 1024px) {
  .container {
    Max-width: 450px;
  }

  Button {
    Font-size: 16px;
  }
}
.container {
  Width: 90%;
  Max-width: 400px;
}
</style>
</head>
<body>

    <header>
    <div class="logo">FitLife</div>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>
</header>
<div id="sidemenu" class="side-menu">

<a href="javascript:void(0)" 
onclick="toggleMenu()">✖</a>

<a href="index.html">خانه</a>

<a href="fitness.html">آزمون BMI</a>

<a href="shop.html">فروشگاه</a>

<a href="admin.html">پنل مدیریت</a>

<a href="javascript:void(0)" onclick="toggleDark()">
🌙دارک مود
</a>

<a href="login.html">ورود به پنل</a>

</div>

    <div class="card">
        <h2 id="welcome"></h2>
        <div class="profile-card">
            <h3 id="profilename"></h3>
        </div>
        <h1>🎉 خوش آمدید</h1>
        <div class="health-card">
        <p id="bmiresult"></p>
        <p id="statusresult"></p>
        </div>
        <p>ورود شما با موفقیت انجام شد.</p>
        <a href="index.html">بازگشت به صفحه اصلی</a>

</div>

<script>
    if(
    localStorage.getItem("theme") == 
    "dark"){
document.body.classList.add(
    "dark-mode"
)}
    let username = 
    localStorage.getItem("username");
    document.getElementById("profilename").innerHTML = 
    username;
    document.getElementById("welcome").innerHTML ="سلام" + username +"";

    let bmi=
    localStorage.getItem("lastBMI");

    document.getElementById("bmiresult").innerHTML = 
    "اخرینBMIشما:"+ bmi;

let status = 
localStorage.getItem("status");
let card =
document.querySelector(".health-card");

if(status == "وزن کم"){

card.style.background="#2196F3";

}
else if(status =="نرمال"){
card.style.background="#4CAF50";
}
else if(status == "اضافه وزن"){
card.style.background="#ff9800";
}
else{
card.style.background="#f44336";
}
    document.getElementById("statusresult").innerHTML = 
    "وضعیت شما:" + status;

    function toggleMenu(){

let menu =
document.getElementById("sidemenu");

if(menu.style.width=="250px"){
menu.style.width="0";
}
else{

menu.style.width="250px";

}

}
function toggleDark(){
document.body.classList.toggle(
"dark-mode"
);
}
function toggleDark(){
document.body.classList.toggle(
"dark-mode"
);

if(
document.body.classList.contains(
"dark-mode"
)
){
localStorage.setItem(
"theme",
"dark"
);
}
else{

localStorage.setItem(
"theme",
"light"
);
}
}
</script>
<footer>
    © 2026 FitLife | طراحی توسط شما
</footer>

</body>
</html>
