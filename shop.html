<script>
    let products = [

  {name:"دمبل", price:200000, img :"c:\Users\MHC\Documents\قد ووزن\imags\۱۱.png"},

];


function render(){
  let box = document.getElementById("products");
    box.innerHTML = "";
  products.forEach(p=>{
    box.innerHTML += `
      <div class="product">
        <img src="${p.img}" width="100">
        <h3>${p.name}</h3>
        <p>${p.price} تومان</p>
        <button onclick="add('${p.name}',${p.price})">
          افزودن
        </button>
        <button onclick="buyNow('${p.name}')">خرید اصلی</button>
      </div>
    `;
  });
}

    if(
    localStorage.getItem("theme") == 
    "dark"){
document.body.classList.add(
    "dark-mode"
)}
function toggleMenu(){
let menu =
document.getElementById("sidemenu");
if(menu.style.width=="250px"){
menu.style.width="0";
}
else{
menu.style.width="250px";
}
}
function toggleDark(){ 
document.body.classList.toggle(
"dark-mode"
);
}


function add(name,price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
    console.log("renderاجرا شد")
  let item = cart.find(i=>i.name===name);

  if(item){
    item.qty++;
  }
  else{
    cart.push({name,price,qty:1});
  }

  localStorage.setItem("cart",JSON.stringify(cart));
  alert("اضافه شد ✔");
  updatecartcount();
}

function goCart(){
  window.location.href="cart.html";

}

function updatecartcount() {
  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];
  let total = 0;
  cart.forEach(item=>{
    total+=item.qty;
  })
  document.getElementById("cartcount").innerText = total;
}
function buyNow(name){
  alert(name +" به مرحله پرداخت رفت ")
}
function sortcheap(){
  products.sort((a,b)=>a.price-b.price);
  render();
}
function sortExpensive(){
  products.sort((a,b)=>b.price-a.price);
  render();
}
render();
updatecartcount();
</script>
