<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>درگاه پرداخت</title>

<style>
Body{
  Font-family:sans-serif;
  Background:#0f172a;
  Color:white;
  Text-align:center;
  Padding:50px;
}

.box{
  Background:#1e293b;
  Padding:50px;
  Border-radius:20px;
  Max-width:400px;
  Margin:auto;
}

.loader{
  Width:50px;
  Height:50px;
  Border:5px solid #334155;
  Border-top:5px solid #22c55e;
  Border-radius:70%;
  Margin:200px auto;
  Animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

Button{
  Margin-top:15px;
  Padding:10px 20px;
  Border:none;
  Border-radius:10px;
  Cursor:pointer;
}

body{
margin:0;
font-family:tahoma;
background:#f5f7fa;
flex-direction: column;
display: flex;
min-height: 100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(135deg,#81dd84,#89bde7);
color:white;
}
.logo{

font-size:22px;
font-weight:bold;

}
nav a{
color:white;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}
    footer{
    text-align:center;
    padding:20px;
    margin-top: auto;
    background:#222;
    color:white;
}
.side-menu a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
font-size:18px;
}

.side-menu a:hover{
background:#333;
}

.menu-btn{
font-size:32px;
cursor:pointer;
}

.side-menu{
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    right: 0;
    background: #222;
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 60px;
    z-index: 999;
}


@keyframes gradientBG{

0%{
Background-position:0% 50%;
}

50%{
Background-position:100% 50%;
}

100%{
Background-position:0% 50%;
}

}
.dark-btn{

Font-size:28px;

Cursor:pointer;

Margin-right:15px;
}
.dark-mode{

Background:#121212 !important;

Color:white;

}

.dark-mode .stat-box,
.dark-mode .feature-item,
.dark-mode .card,
.dark-mode .login-box{

Background:#1e1e1e;

Color:white;

}

.dark-mode footer{

Background:#000;

}

.dark-mode input{

Background:#333;

Color:white;

Border:1px solid #555;

}
</style>
</head>

<body>
<body>
  <header>
    <h1>FitLife</h1>

</div>
</div>

</header>
<div id="sidemenu" class="side-menu">

<a href="javascript:void(0)" 
onclick="toggleMenu()">✖</a>

<a href="index.html">خانه</a>

<a href="fitness.html">آزمون BMI</a>

<a href="javascript:void(0)" onclick="toggleDark()">
🌙دارک مود
</a>

<a href="login.html">ورود به پنل</a>

</div>
<div class="box">
  <h2>💳 درگاه پرداخت</h2>

  <p>در حال اتصال به بانک...</p>
  <div class="loader"></div>
  <p id="status">لطفاً صبر کنید</p>

  <button onclick="pay()">سبد خرید</button>

  <h2>ثبت سفارش</h2>
  <input id="name" placeholder="نام">
  <input id="phone" placeholder="شماره">
  <textarea id="address" placeholder="ادرس"></textarea>
<button onclick="submitOrder()">ثبت سفارش</button></div>
<script>
    
    if(
    localStorage.getItem("theme") == 
    "dark"){
document.body.classList.add(
    "dark-mode"
)}
function toggleMenu(){
let menu =
document.getElementById("sidemenu");
if(menu.style.width=="250px"){
menu.style.width="0";
}
else{
menu.style.width="250px";
}
}
function toggleDark(){ 
document.body.classList.toggle(
"dark-mode"
);
}
function pay(){

  document.getElementById("status").innerText = "در حال بررسی...";

  setTimeout(()=>{
    let success = math.random() > 0.3; // 70% موفق

    if(success){
      document.getElementById("status").innerText = "✅ پرداخت موفق بود";
      localStorage.removeItem("cart");

      setTimeout(()=>{
        window.location.href = "index.html";
      }, 2000);

    } else {
      document.getElementById("status").innerText = "❌ پرداخت ناموفق";
    }

  }, 3000);
}
function submitOrder(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert(" همه فیلدها را پر کنید");
    return;
  }

  // 💾 ذخیره اطلاعات مشتری
  let orderInfo = {
    name: name,
    phone: phone,
    address: address
  };

  localStorage.setItem("orderInfo", JSON.stringify(orderInfo));

  // 💳 گرفتن سبد خرید
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if(cart.length === 0){
    alert("سبد خرید خالی است");
    return;
  }

  // 📦 ساخت سفارش
  let order = {
    customer: orderInfo,
    items: cart,
    date: new Date().toLocaleString()
  };

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(order);

  localStorage.setItem("orders", JSON.stringify(orders));

  // 🧹 پاک کردن سبد
  localStorage.removeItem("cart");

  // 🚀 انتقال به فاکتور
  window.location.href = "success.html";
}
    if(
    localStorage.getItem("theme") == 
    "dark"){
document.body.classList.add(
    "dark-mode"
)}
function toggleMenu(){
let menu =
document.getElementById("sidemenu");
if(menu.style.width=="250px"){
menu.style.width="0";
}
else{
menu.style.width="250px";
}
}
function toggleDark(){ 
document.body.classList.toggle(
"dark-mode"
);
}

renderCart();
</script>
