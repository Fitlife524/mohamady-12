<div class="container">
<h2>محاسبه BMI</h2>

<input type="number" id="height" placeholder="قد (سانتی متر)">

<input type="number" id="weight" placeholder=" وزن(کیلوگرم) ">

<input type="number" id="age" placeholder="سن">
<select id="activity">
    <option value="کم">فعالیت کم</option>
    <option value="متوسط">فعالیت متوسط</option>
    <option value="زیاد">فعالیت زیاد</option>
</select>
<button onclick="calculateBMI()">
محاسبه BMI
</button>

<div id="result" class="result-card"></div>
<div class="bmi-bar">
<div class="bar underweight">کم وزن</div>
<div class="bar normal">نرمال</div>
<div class="bar overweight">اضافه وزن</div>
<div class="bar obese">چاقی</div>
</div>
<div class="bmi-bar">
</div>
<img id="bodyImage"
Src=""
Style="width:200px;display:none;margin-top:20px;">

</div>

<script>
if(
    localStorage.getItem("theme") == 
    "dark"){
document.body.classList.add(
    "dark-mode"
)}
function toggleMenu(){
let menu =
document.getElementById("sidemenu");
if(menu.style.width=="250px"){
menu.style.width="0";
}
else{
menu.style.width="250px";
}
}
function calculateBMI() {

    let height = parseFloat(document.getElementById("height").value);
    let weight = parseFloat(document.getElementById("weight").value);

    let age =
    document.getElementById("age").value;
     let activity =
    document.getElementById("activity").value;
    if (!height || !weight) {
        alert("قد و وزن را وارد کنید");
        return;
    }
     let bmi = weight / ((height / 100) * (height / 100));

     let score = 
     0;
     if(bmi <18.5){
        score = 60;
     }
     else if(bmi <25){
        score =95;
     }
     else if(bmi <30){
        score =75;
     }
     else{
        score= 50;
     }
     if(activity == "کم"){
        exercise ="پیاده روی روزانه30دقیقه"
     }
    else if(activity =="متوسط"){
        exercise = "هفته ای 3جلسه ورزش"
    }
    else{
        exercise ="ادامه برنامه فعلی"
    }
    localStorage.setItem("lastBMI",bmi.toFixed(1));
    let result = document.getElementById("result");
    let image = document.getElementById("bodyImage");

if (isNaN(height) || isNaN(weight)) {
    alert("قد و وزن را وارد کنید");
    return;
}
 if(bmi < 18.5){
localStorage.setItem("status","وزن کم");
result.innerHTML =
"BMI شما: " + bmi.toFixed(1) +
"<br>امتیاز سلامت:" +score+"/100"+
"<br><br>وضعیت: کم وزن" +
"<br>سن" + age +
"<br>فعالیت:" + activity +
"<br>ورزش پیشنهادی:" +exercise;
image.src =
"imag/file_000000003a3c720aae0242a0cd2e82e5.png";
image.style.display = "block";
result.style.background ="#2196f3";
}

else if(bmi < 25){
    localStorage.setItem("status","نرمال");
result.innerHTML =
"BMI شما: " + bmi.toFixed(1) +
"<br>امتیاز سلامت:" +score+"/100"+
"<br><br>وضعیت: نرمال" +
"<br>ورزش پیشنهادی:" +exercise;
image.src =
"imag/Screenshot_20260601_101941_ChatGPT.jpg";
image.style.display = "block";
result.style.background ="#4Caf50";
}

else if(bmi < 30){
    localStorage.setItem("status","اضافه وزن");
result.innerHTML =
"BMI شما: " + bmi.toFixed(1) +
"<br>امتیاز سلامت:" +score+"/100"+
"<br><br>وضعیت: اضافه وزن" +
"<br>ورزش پیشنهادی:" +exercise;
image.src =
"imag/ورزش اضافه وزن.png";
image.style.display = "block";
result.style.background ="#ff9800";
}

else{
    localStorage.setItem("status","چاقی");
result.innerHTML =
"BMI شما: " + bmi.toFixed(1) +
"<br>امتیاز سلامت:" +score+"/100" +
"<br><br>وضعیت: چاقی" +
"<br>ورزش پیشنهادی:" +exercise;
image.src =
"imag/file_0000000070707243bc509485f331d199.png";
image.style.display = "block";
result.style.background ="#f44336";
}
    image.style.display = "block";

    
let history = JSON.parse(localStorage.getItem("bmiHistory")) || [];

history.push({
  bmi: bmi
});

localStorage.setItem("bmiHistory", JSON.stringify(history));

}
function toggleDark(){ 
document.body.classList.toggle(
"dark-mode"
);
}
function toggleDark(){
document.body.classList.toggle(
"dark-mode"
);

if(
document.body.classList.contains(
"dark-mode"
)
){

"theme",
"dark"
);
}
else{

localStorage.setItem(
"theme",
"light"
);
}
}

</script>
