0%{

50%{

}

function loadInvoice(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let box = document.getElementById("items");
  let total = 0;

  if(cart.length === 0){
    box.innerHTML = "<p style='text-align:center'>سبد خرید خالی است</p>";
    return;
  }

  cart.forEach(item => {

    let qty = item.qty || 1;
    total += item.price * qty;

    box.innerHTML += `
      <div class=”item”>
        <span>${item.name} × ${qty}</span>
        <span>${item.price * qty} تومان</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;

  // بعد از ساخت فاکتور، سبد پاک شود
  iocalStorage.removeItem("cart");
}
