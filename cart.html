<h1>🛒 سبد خرید شما</h1>

<div id="cartBox"></div>
<h2 id="total"></h2>
<div class="cart-container">
  <div id="cart"></div>
</div>
<button onclick="clearCart()">🗑️ حذف همه</button>
<button onclick="goShop()">⬅ برگشت به فروشگاه</button>
<button class="checkout-btn" onclick="goToCheckout()">
رفتن به پرداخت 💳
</button>

<script>
if(
    localStorage.getItem("theme") == 
    "dark"){
document.body.classList.add(
    "dark-mode"
)}
function toggleMenu(){

let menu =
document.getElementById("sidemenu");

if(menu.style.width=="250px"){
menu.style.width="0";
}
else{

menu.style.width="250px";

}

}
function toggleDark(){
document.body.classList.toggle(
"dark-mode"
);
}
function toggleDark(){
document.body.classList.toggle(
"dark-mode"
);

if(
document.body.classList.contains(
"dark-mode"
)
){
localStorage.setItem(
"theme",
"dark"
);
}
else{

localStorage.setItem(
"theme",
"light"
);
}
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart(){
  let box = document.getElementById("cartBox");
  box.innerHTML = "";

  let total = 0;

  if(cart.length === 0){
    box.innerHTML = "<p>سبد خرید خالی است 😐</p>";
    document.getElementById("total").innerText = "";
    return;
  }

  cart.forEach((item,index)=> {
    box.innerHTML += `
    <div class="product">
        <p>${item.name}</p>
        <p>قیمت: ${item.price}نومان </p>
        <p>تعداد: ${item.qty}</p>
        <p>جمع: ${item.price * item.qty} تومان</p>
        <button onclick="removeItem(${index})">❌ حذف</button>
        <button onclick="plusItem(${index})">+</button>
        <button onclick="minusItem(${index})">-</button>
      </div>
    `;
    total += item.price * item.qty;
  });

  document.getElementById("total").innerText =
    "جمع کل: " + total + " تومان";
}

function removeItem(index){
  cart.splice(index, 1);
  save();
  renderCart();
}

function clearCart(){
  cart = [];
  save();
  renderCart();
}

function goShop(){
  window.location.href = "shop.html";
}
function plusItem(index){
  cart[index].qty++;
  save();
  renderCart();

}

function minusItem(index){
  cart[index].qty--;
  if(cart[index].qty <=0){
    cart.splice(index,1);
  }
  save();
  renderCart();
}
function goToCheckout(){
  window.location.href = "checkout.html";
}

renderCart();
</script>
